buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.8.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
    }
}

plugins {
    id "com.facebook.react.rootproject"
}

/** Keep androidx.core on 1.15.x until we move to compileSdk 36 + AGP 8.9+ (core 1.17+ requires API 36). */
subprojects { subproject ->
    subproject.configurations.configureEach { config ->
        config.resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.core' &&
                (details.requested.name == 'core' || details.requested.name == 'core-ktx')) {
                details.useVersion '1.15.0'
            }
        }
    }
}
